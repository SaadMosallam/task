  <text x="150" y="214.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#888" letter-spacing="1">WYZE</text>
  <!-- LED indicator -->
  <circle cx="150" cy="96" r="4" fill="#60a5fa"/>
  <circle cx="150" cy="96" r="2" fill="#93c5fd"/>
  <!-- Mounting clip hint -->
