<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="white"/>
  <!-- Body -->
  <rect x="90" y="70" width="120" height="155" rx="16" fill="#e9e9e9" stroke="#d4d4d4" stroke-width="1.5"/>
  <rect x="97" y="77" width="106" height="141" rx="12" fill="#f4f4f4"/>
  <!-- PIR lens dome -->
  <ellipse cx="150" cy="148" rx="40" ry="38" fill="#ddd"/>
  <ellipse cx="150" cy="148" rx="31" ry="30" fill="#c8c8c8"/>
