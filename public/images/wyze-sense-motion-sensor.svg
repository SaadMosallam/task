  <path d="M120 140 L180 140" stroke="#d4d4d4" stroke-width="1" opacity="0.6"/>
  <ellipse cx="150" cy="148" rx="31" ry="30" fill="none" stroke="#ccc" stroke-width="1"/>
  <ellipse cx="150" cy="148" rx="18" ry="17" fill="#b0b0b0"/>
  <ellipse cx="150" cy="148" rx="9" ry="8.5" fill="#444"/>
